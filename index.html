<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Mari & Jon – 1 Month</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0d0d0d;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
}

/* container */

.player{
position:relative;
width:420px;
}

/* cd case */

.case{
width:100%;
display:block;
}

/* wrapper handles positioning */

.cd-wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
width:62%;
}

/* cd */

.cd{
width:100%;
cursor:pointer;
}

/* spin animation */

.spin{
animation:spin 3s linear infinite;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

.caption{
position:absolute;
bottom:-40px;
width:100%;
text-align:center;
color:white;
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<div class="player">

<img src="case.png" class="case">

<div class="cd-wrapper">
<img src="cd.png" class="cd" id="cd">
</div>

<div class="caption">
click the CD to play / pause
</div>

</div>

<audio id="song">
<source src="You re All I Want - Cigarettes After Sex.mp3" type="audio/mpeg">
</audio>

<script>

const cd = document.getElementById("cd");
const song = document.getElementById("song");

let playing = false;

cd.addEventListener("click", async () => {

if(!playing){
await song.play();
cd.classList.add("spin");
playing = true;
}
else{
song.pause();
cd.classList.remove("spin");
playing = false;
}

});

</script>

</body>
</html>
