<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Mari & Jon – 1 Month</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:radial-gradient(circle at center,#1a1a1a,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:white;
}

.player{
position:relative;
width:420px;
}

.case{
width:100%;
display:block;
filter:drop-shadow(0 0 20px rgba(255,255,255,0.1));
}

/* wrapper handles centering AND spinning */

.cd-wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:62%;
}

/* spin the wrapper instead of the image */

.spin{
animation:spin 12s linear infinite;
}

@keyframes spin{
from{
transform:translate(-50%,-50%) rotate(0deg);
}
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

/* cd image */

.cd{
width:100%;
cursor:pointer;
border-radius:50%;
transition:transform .3s ease, filter .3s ease;
}

.cd:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

.caption{
margin-top:18px;
text-align:center;
font-size:14px;
opacity:.75;
letter-spacing:1px;
}

.title{
position:absolute;
top:-50px;
width:100%;
text-align:center;
font-size:20px;
letter-spacing:2px;
opacity:.85;
}

</style>
</head>

<body>

<div class="player">

<div class="title">
Mari & Jon 💿 1 Month
</div>

<img src="case.png" class="case">

<div class="cd-wrapper" id="cd-wrapper">
<img src="cd.png" class="cd" id="cd">
</div>

<div class="caption">
click the CD to play / pause
</div>

</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const cd = document.getElementById("cd");
const wrapper = document.getElementById("cd-wrapper");
const song = document.getElementById("song");

cd.addEventListener("click", () => {

if(song.paused){
song.play();
wrapper.classList.add("spin");
}
else{
song.pause();
wrapper.classList.remove("spin");
}

});

</script>

</body>
</html>
