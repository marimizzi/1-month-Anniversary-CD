<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Mari & Jon – 1 Month</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0d0d0d;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
}

/* container */

.player{
position:relative;
width:420px;
}

/* cd case */

.case{
width:100%;
display:block;
}

/* cd disc */

.cd{
position:absolute;
width:62%;
top:22%;
left:19%;
cursor:pointer;
transition:transform .3s;
}

/* hover effect */

.cd:hover{
transform:scale(1.05);
}

/* spinning animation */

.spin{
animation:spin 3s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* small caption */

.caption{
position:absolute;
bottom:-40px;
width:100%;
text-align:center;
color:white;
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<div class="player">

<img src="case.png" class="case">

<img src="cd.png" class="cd" id="cd">

<div class="caption">
click the CD to play / pause
</div>

</div>

<audio id="song">
<source src="You re All I Want - Cigarettes After Sex.mp3" type="audio/mpeg">
</audio>

<script>

const cd = document.getElementById("cd");
const song = document.getElementById("song");

let playing = false;

cd.addEventListener("click", () => {

if(!playing){
song.play();
cd.classList.add("spin");
playing = true;
}
else{
song.pause();
cd.classList.remove("spin");
playing = false;
}

});

</script>

</body>
</html>
